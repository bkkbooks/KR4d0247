body:
  text: 義豐集别集類三宋提要臣等謹案義豐集一卷宋王阮撰阮字南卿德安人王韶之曾孫隆興元年進士仕至撫州守召入奏韓托胄欲見之卒不往怒使奉祠歸廬山以終阮少謁朱子於考亭朱子知南康時阮又從遊故集中有唱酬之作阮之歸也朱子惜之謂其才氣術略過人而流落不偶集首有淳祐癸卯吳愈序謂其文無一字無來處論邊事則鼂賈其倫為記銘則韓栁其亞今其文集未見所存僅詩一卷蓋傳録者以全集之序辨詩之首也劉克莊嘗跋其詩謂髙處逼陵陽茶山陵陽者韓駒茶山者曾幾也嶽珂桯史稱阮學於張紫微載其萬杉寺唱和絶句及重過萬杉寺絶句紫微者張孝祥也曾詩祖述黃庭堅張詩則摹擬蘇軾韓詩則出入於蘇黃今觀阮詩驛騎于兩派之間各得一體克莊及珂所述固皆為近實矣珂又記阮所作詩號義豐集刻於江畔校官馮椅為之序是阮詩本有單行之本不知何以佚去椅序易以愈序也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀義豐集序觀士大夫言行當于其大節不顓于文藝也劉禹錫桞宗元述作雄深法度嚴密發纎穠於簡古寄至味於淡泊非餘子所及然坐王叔文黨君子惜之士大夫欲為君子者苟人不已知世不吾以則有致命遂志而已窮居不損焉乃若俯仰隨時僥幸得志雖有才美不足觀也已慶元初孽臣竊柄士大夫倚為泰山其門如市吾邑王公先生以蓍蔡之明冰霜之操未嘗一躡其門晚官臨川陛辭奏事柄臣使密客誘致之迄弗往見奉祠而歸優遊山間無一毫隕穫意此曽子所謂𢎞毅之士歟先生所為文無一字無來處蓋其多識前言往行以蓄其德而又深於憂患才老而氣定故流於既溢之餘嶄然出入意表自其省闈三策辭嚴而義偉已不肯為舉子之文矣厥後論邊事則鼂賈其倫也為記銘則韓桞其亞也其詩如題浯溪碑蘭亭記金山廟之類折衷古人之得失發越詞令所未言至於感物興懷酬唱嘲詠筆力雄放皆有深意杜少陵其比也顧其平生大志欲禆國論扶王室盡心所事以光祖閥則有在彼而不在此者一不獲伸賚志沒地而以文藝稱于世抑其土苴云耳愈少之時嘗操几杖從先生遊今老矣髙山景行之思猶日往月來于懷也其子且為邑惠之博羅稡其文鋟梓以歸屬愈識其卷首藐焉晚進何敢措一辭獨念前輩典刑之老中原文獻之裔去世逾逺一時出處大節後生鮮有聞者孟子曰誦其詩讀其書不知其人可乎故為述其槩云淳祐癸邜夏六月甲子里人吳愈序

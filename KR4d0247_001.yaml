body:
  text: 義豐集宋王阮撰詩古意二首西風䇿策翻葉鳴錦機停梭人暗驚歸心欲附潮頭去潮頭不肯到湓城洞庭九月湖水乾倒影夜瞰星斗攢水官籋浪蹴寒玉船過兩耳聲珊珊明妃曲一首黃塵漠漠風捲沙明妃馬上彈琵琶琵琶一曲思歸譜明妃淚盡邉人舞邉人不道思歸苦更問漢宫餘幾許古來和戎人似鐵漢家和戎人似雪午忩一抹春山橫萬里關河不須設燕支寒帳秋復春翠被不禁愁殺人人生不可無黃金無黃金兮死沉淪明妃也莫怨青冢死有佳名生有用君不見秦樓當日卷衣女一一空隨宿草腐續湖隂一首王敦稱兵內向明帝微行湖隂故樂府有湖隂曲然亡其詞也余泊舟堂下誦溫庭筠補亡惜意未盡因為續焉華林鳴蛙私邪官金陵指顧成長安唾壺一曲玉如意聲斷石城鋒鏑寒從來龍化中興主不似黃鬚阿奴武當時斬鞅心下事今日揚鞭目中敵黃埃散漫重瞳微雨師不灑疑人知夢回日轉驚已午馬驕風疾那容追一聲吉語禁門靜萬國笙歌丹仗整山傾海動忽燃臍地闢天開誰問鼎長江十里真險哉煌煌晉業流秦淮江濤一洗妖氛息湖隂千古琉璃碧代胡倉進聖德惠民詩一首并序臣竊惟先王盛時大夫從事於外必有聲詩道其不遑寧處之情而極夫節物之變耳目所接託興喻物一於心聲發之非以自矜其功也以為君臣之際天下真情所在序其情而閔其勞君子之道云爾恭惟陛下康濟懷保如周文王臣於此時得從大夫之後備使一方敢不激勵奮發以求不負陛下臨遣之意用集所見與其所聞因其方言間以俚語稍加櫽括比為近體詩一百韻走驛請通進司投進兾塵一覽文詞鄙陋不足發揮至德之光臣則有罪若夫字字必實言言不誣舉可覆視當堯章煥乎之日犯狂簡斐然之戒仄身覆燾實無所容冒犯天威臣無任俯伏俟命之至平楚皆膏壤成湯忽旱年人知聖慮切恩遣使臣宣乙卯飢荒後長沙富庶全紀年四十載斗米二三錢潭州自紹興五年一旱後豐稔三十八年縣縣人煙密村村景物妍朱蹄驕栁陌金鐙麗花鈿長沙自唐號小長安朱蹄金鐙杜甫所云習此民成懶加之吏不虔力耕終苟且勸課或遷延緑野田多曠潢池惡未悛曷嘗修稼政但見飾賓筵豐稔時難保盈虛理有還自應成赤地安得咎蒼天義廪真良法常平皇家以備先積倉何止萬存數僅餘千潭州每歲正苖三十八萬石每石收義倉一斗自乙卯至辛卯當有百萬石臣到任點檢僅存四萬石濫以踈庸迹來司斂散權一身初扺此四顧但茫然奏發常平弊財蒙內帑捐敢云呈敏手幸免奮空拳蔑問秦輸閉專稽稷懋遷陸資流馬運水作泛舟連凡屬災傷事深將利害研兼并勤告諭商旅漸喧闐市直雖翔踴官收却痛蠲北來因鼎粟南至出渠船分路招糴廣米自靈渠出稍稍收成廪紛紛出著鞭起於衡嶽趾環厥洞庭舷湖北疆參錯江西境接聯里雖千萬逺身亦再三遄必務經行遍深防賑給偏規模頒羣吏出納謹鄉賢敢避風兼雨周爰陌與阡有時沉水底鎮日上山巔不復通舟楫寧容坐馬韀屐多穿石仄裳慣濕河壖江步時時到村虛日日穿楚語以江岸為步村市為虛救頭方甚急援手詎辭胼疇昔雖多病馳驅却自痊已成迷曉夜不復憚山川松徑行時蓋楊花坐處氊光華雖備使蕭散類登仙林密花頻剪途窮木可緣石欹行恐壓溪漲涉疑漩昔出正初吉今經六下弦以正月出巡七月還司奔忙馳似箭來往轉如圜王事歌苞杞歸心却杜鵑力雖疲險阻志務報陶甄憶昨初行日蕭然亦可憐餓羸皆偃仆疾疫更牽纏詎止家徒壁多遺屋數椽葛根殫舊食竹米繼新饘去冬人食葛根今春又食竹米略救朝昏急終非肺腑便聲音中改變形質外羸孱氣薾胸排骨神昏眼露圈步欹身欲仆頭褪髮俱卷婦餒心成疾兒啼口墜涎亂花生目睫炎火亢喉咽裊裊渾無力昏昏只欲眠盡攣持耒手頓削負薪肩象貌已成鬼號呼幾亂蟬獸窮思曠野魚困想清泉山僻無人到惟驚有使褰初聞爭欲走稍定使來前爾俗飢雖困吾君施體乾知民方疾苦遣吏撫迍邅置院收鰥寡分場賑市㕓貸糧招復業散種使耕田臣常乞以米五萬石依條給貸四等以下户又以榖三萬分諸縣借給寒給衾裯暖給紙襖春頒藥劑煎凡今嚴吏責皆是恤民編稍見兒童集徐看父子牽共爭扶杖聽咸樂置郵傳茶獻迎門禮香浮夾道煙耳聞身鼓舞心切涕潺湲坐定徐言此從來未見焉一時愆潤澤萬里奏艱鮮灌溉非無桔精虔亦有牷畬乾終損粟池涸竟枯蓮詩駭周宣魃經書魯國蝝坐令民皥皥翻作淚漣漣平日安豐稔今朝乍疾顛老羸如病馬壯健若飛鳶忽見皇恩沐親馳使命専聽言初挾纊拜賜悉鳴絃新嵗天心格經時雨勢綿東臯耕澤澤南畝溜濺濺坎豆皆勤作根涯悉勉旃水耕榮唪唪陸種茂芊芊件件絲盈軸方方麥薦籩楚語以種物為坎豆勤苦為根涯以匹為件以三升為一方指知食欲動目望酒先撋舍北行歌暢村南伐鼓淵魚占何必夢斗覆已明躔甲子晴尤好嘉平雪記埏自今知嵗嵗王道永平平撫已叨逢主占星幸備員耳親聞擊壤手敢廢題箋農事修其職邦基賴以堅但令倉廪實何必鼎鐘鐫商克周飢止邢存衛雨愆定知豐稼穯端在講戈鋋足食繄兵法行糧詠雅篇願陳王朴論一稔遂平邉王朴邉䇿一稔可以平邉上九江唐舍人文若一首五十韻江左承南渡潯陽控上流平時稱用武今日更防秋六代規摹古三江險厄周高憑隆屏翰下瞰握襟喉呼吸聞吳楚封疆矗斗牛循良渡虎迹神武射蛟逰勝事餘蓮社風光足庾樓倚天開峻極倒影湛飛浮鼎敗香山往官輕靖節休義門十世美將業二王優頃嵗承平久斯民習俗修究心依學校服力事田疇獄淨苔荒砌山深麥挂丘共知忠義篤肯陷矯誣羞不料戈鋋起能令日月幽雲屯滿赤縣天意卒鴻溝郡邑生荆棘江湖識冕旒竟捐形勢地聚作虎狼陬紹興初李成盜此昔計何勝辱羣生亦暫偷竒功思赫赫內治頗悠悠法令中間弊流移不可留經界法行始有交居之弊産去稅存德安一縣歲逃移千七百户未經真撫恤還已困虔劉對壘緣淮甸長蛇集戟矛金兵南下其臣有欲首取江州者雷聲忽天狗旗尾又蚩尤隔岸幾航葦孤城亦綴斿兵戈間耒耜戰艦奪松楸天下雖同擾江西又不侔宿師惟此地江南獨此屯戍履畝倍他州曹翰治江州獨用偽唐全稅諸將紛紛是攸司日日掊文符競旁午膏血罄誅求戰鬬連年永瘡痍幾日瘳蘖芽終作梗氣習遂成偷情動穿墉鼠風行借父耰風俗舊淳今狡秉彛均物則失德自乾餱近世凡臨政何人解撫柔帝為輟近侍人喜得賢侯父子文章偉君臣契分投王言資潤色國事仗謀猷詩似丘傳鯉書如固續彪鳯毛宜鸑鷟驥種自鞾騮增重依蓮幕尤煩借箸籌折衝皆婉畫賜履又分憂奕奕長江上源源數路頭若非煩柱石何以鎮貔貅南土驚新事西清擁碧油春風回野色江月靜簾鈎地借長城望塵清奕世讎有生皆固結無土不冥搜公下車之始即問姓名立國須才用聞公鋭意收龍門如可上敢請與荀儔瑞麥謡一首淮海宜麥舊矣瑞我聖世疉出濠梁淳熙戊戌得兩岐者一守臣張士元記其異紹熙甲寅又得之益以三岐者守臣黃萬石再播頌聲慶元戊午夏四月壬申牧兒丁道僧越五日丙子農者京太谷獻如紹熙之數又草日丙申民兵統領李道裒雙穗者馳丁夫蔡進以獻多至三十有八和之至也是嵗五穀熟為大有年守臣某仰體謙制不敢以聞亦不敢替厥事賦瑞麥謡紀聖治也稗草化稻疑談空我有異麥真年豐三岐鼎足如爭雄兩岐對秀攢眉峯棣華英粲花影重黃雲列陳翻春風問此厥初何所從塗山之陽一牧童手持足接復一翁三十八雙來無窮慶元道大天下公漸漸擢芒瑞時雍不生內地生邉封天以德致驚諸戎周家之始西徂東彼疆為密此界崇已而率育四海同帝命蓋自貽牟通漁陽昔當漢之隆亦有此瑞堪形容氓謡不上甘泉宫私以譽守疑非恭濠梁獻祥不一逢一生二生重熙中今年分外佳氣濃疆吏豈敢貪天功歸禾擬奏區區忠仄聞聖德方謙沖班春於郊但勸農諭以種麥莫懶慵大麥更戒細細舂明年從駕巡崆洞此飯要到滹沱供和陶詩六首并序古詩不和唐始有之亦未有追和古人者雪堂先生始出新意盡𢋫淵明詩彼誠有感云爾隆興二年余浮家東吳僦居日糴大水入室無所容其軀妻孥嗷嗷至絶煙火羇旅憔悴如雪堂之在嶺外而淵明之棄彭澤也由是宦情日薄而歸志日濃矣暇日讀淵明詩不能盡和也事類意感輒繼和焉懼觀者不我赦也故序其意云和歸田園皇天亦愛我生我匡廬山勉承父母志功名期少年既無取日手逺去窮虞淵又無謀生才廣有負郭田富貴兩不諧胡為乎世間春言敷原居宛在瀑布前野曠易得月谷虛常帶煙行歌紫芝曲醉上香爐巔念此百年身有此足以間若乃不決去使彼山悽然和飲酒竹門固無鎖俗客自不開而欲挾彼態使我變所懷鄉原善同俗於德則有乖乃知違世人所貴在幽棲客有愛我甚命駕來衝泥憐我與俗異欲我與世諧甚知客言是甚知余心迷淵明飲酒詩𢋫以遺客回和乞食淮隂漂母事不謂身見之長歌淵明詩益信非虛詞余嗟客長安十載無休期一飽不自足况敢謀酒巵曳裾富門兒丐食酬一詩逹於公卿間喧喧謂余非雖知責我至終亦無所貽和貧士吾聞戴安道不對王侯琴當時豈不能低眉求賞音一曲朝得聞千金夕來尋捨之不肯顧輕重得所斟小人一時快君子百世欽貧士繄此辨士乎當正心和雜詩遑遑行路難汲汲艱食迫井田邈不再兼并蔽阡陌永懷先父祖遺我以清白出門無所容疑此天地窄秋風瘦遙山涼意愜行客江南記舊逰不歷岐王宅又和淵明棄彭澤歸與在柴桑我里亦其側俯視世粃粳顧瞻無所憂所憂在絶糧敢辭躬耕勞耒耜山之陽惜哉命之窮仍嵗螟傷去為遊手民足迹已四方拂衣却歸去焉用祖離觴陪晦翁登妙髙峯一首千崖盤屈曲一塔矗空濛他處只山好此中兼水洪縱觀疑犯斗飛上覺凌風常恨天難近今朝路已通送晦翁十首精微元不在河汾原道辭雄亦淺聞自得正心誠意論始知天未喪斯文淵泉溥博與天大土苴緒餘聊覺民千古濓溪好風月一回拈出一回新武夷山下孤高節五老亭中撫字心出處本來無二致詎分鐘鼎與山林靈臺一似大圓鏡妍醜自分吾不知秋殺春生天道爾先生喜怒一何私去年民食十分災一力先生盡救回今日手攀轅下者人人都是翳桑來移苖時節雨連天白水青苖滿大田天欲先生歸去後故留遺愛在豐年忌口年來積漸除君王方信是真儒稍移全活一州手再使江西十郡蘇白鹿堂中巧鑄顔天留一派在廬山他時沂水春風裏笑我於中獨自頑糟粕從來空自忙筌蹄今幸得師忘明年重即韓門去拈出胸中一辦香平生自謂此心剛不信離樽可斷腸今日江邉兩行淚更無情緒折垂楊同張安國逰萬杉寺一首寺有昭陵御書昭陵龍去奎文在萬嵗靈杉守百神四十二年真雨露山川草木至今春重九再到張已隔世書詩牌後一首碧紗籠底墨才乾白玉樓中骨已寒淚盡當年聯騎客菊花時節獨來看六言一首秋色染成碧水夜涼瘦落青山樹頭宿鳥歸盡天外行人未還避暑煙水亭與王景文回文聯句一首顔舒且對清樽酒景文晝永方濃翠幄隂南卿環珮響溪寒浪急景文畫圖藏谷繡煙深斑生石潤苔紋亂南卿碧度雲飛鳥影沉景文間館邃風來迥野南卿隔林斜日轉踈林景文虛飄飄一首虛飄飄雪花逢日照栁絮入春搖腐草偏浮屋遊絲織綵綃老蚌三更光射月風鳶一片紙干霄虛飄飄比人富貴猶堅牢滄洲閣集句二首滄洲有竒趣劉禹鍚吾道付滄洲杜甫樹影中流見張祜船燈照島幽司空圖轉思江海上王介甫却著土山頭賀涉野水無人渡冦萊公乘桴學聖丘韓退之又洲島驟回合謝靈運冥冥菰蒲中王安石清流中落鳥張祜遵渚有歸鴻謝瞻水作青羅帶韓退之腳踏赤鯶公蘇東坡蓬壺雖遼絶李白長嘯激清風方太沖新昌書座右屏一首私罪不可有公罪不可無退作陶淵明進學何易于但願列循吏寧甘為鄙夫禍福置不問吾民其少蘇新昌留别一首奉命誅求下户貧抗章懇白上官嗔與其重斂毒千室寧以深文終一身吏務循良邦有賴士雖貧賤氣宜伸空煙亭下桃花水好送扁舟欲去人龍舒朱獻賔主漢陽簿棄官以歸子亦不合丐去為賦一首浪作鸞棲去驚隨鶴怨還無心漢江水有節皖公山此事真堪話諸公寧厚顔嗟豫亦興盡昨夜已投間題靖節先生祠一首督郵行縣先生去之某始未諭以為接之或可同寅焉在未見遽謂小兒去之哉晚得一邑親見羣兒挾權規利難與為仁而後敬嘆先生何其辨之早也夫薄則固其資而傲有所恃昂昻而來以督郵則非尊彭澤則為客知令之賢不能以禮先之坐待其迎責以束帶傲薄備矣欲其同寅難矣哉斤之於未見之先避之於未辱之始至矣先生之明也且督郵瑣瑣無以議為也獨惜而長用非其人卒使銜命者負擠賢之辜出令者貽同惡之誚一舉而賓主交譏焉非類聚乎流弊千載凡一小吏出必以迎謁責人吏多患失竭民力以奉之先生耻之某亦耻之乃賦歸去來以彰立懦時淳熙七年六月草五日也先生新布政誰遣小兒來爾面何須識其心端可猜有名高日月無力救氛埃百世千秋後聞風亦遽回昌國偶成一首諸邑皆山可夜馳海中昌國力難施風潮阻渡由天地期會申嚴限日時願以老身從此免漫將人命逼諸危交門山下須臾死肉食諸公知不知畹别昌國五首妄意絃歌學子遊迄無三異比中牟叮嚀今夜東風雨添起潮頭急去休全家雖脫海波危舊治無人咏十竒孤奉明恩顔似甲却嗔兒女笑嘻嘻三山月淡白銀闕九老春間紫石宫出十洲記此去能爭幾許地恨無仙骨到其中當時底事乞身歸萬物何曾與我違最是臨行更腸斷海鷗猶自掠船飛扶桑曾見日騰空老去歸田不復東一覺短簷他日夢起來惆悵晚忩紅昌國秩滿次陳紏祖行韻一首昔之督郵逐彭澤今之督郵眷昌國不令自賦歸去來更以新詩祖行色開緘墨濕雨濛濛細讀字字含清風塵埃三載足昏塞一聽妙語還醒鬆持歸柴桑有茅舍揭之其間作佳話非惟可詫陶淵明亦愧當年督郵者題四羊圖一首三百維羣世不見乃以四羊為一圖人言此圖出韋偃不知韋偃有意無巖巖參天一古木下有輕荑滿郊緑雲髯隱約黑昏中沙肋微茫筆端足昔聞韋侯畫馬工杜陵長歌歌古松孰知畫羊更如此世間絶藝誰能窮蘄春太守好事者珍藏有此希世畫嗟豫得此雙眼明此一轉語久難下三年逰戲若草茵一羊輒登枯木根安得添我作牧人為公鞭此一敗羣白楊花一首天河秋來有時見秋江人去無還期南風北風日爭吹三十六宫空淚垂塞鴻已作隨陽去社燕寧論故巢住安得胡越為一家春風來訪紅桃花題東林一首并序逺公示寂讖記曰後七百年當有肉身大士革創吾道場晉義熙十二年八月六日也元豐三年先襄敏公請於朝照覺總公崇成法席中燼野燒今復一新敬賦古風仰致讃嘆屏迹敷淺原注目香爐峯飽聞送客溪鼎新古梵宫緬懷結社人豈止避俗翁一念薰戒香千年仰玄蹤蜂房始義熙鳯厯當元豐果有大士出一與遺言同堂堂照覺師赫赫襄敏公徹彼毗尼藏揭我臨濟宗元曰立成佛玻曰僧中龍少林來於西雙林振以東冥數其理暗野燒中宵紅天遣真道人夜役衆鬼工幻出翬飛簷化成雷吼鐘神運儼若初佛法豈有終余生慕真乘願力愧祖風再窺拈花座駿嘆折草功請續香山堂老此平臺中白撫生池蓮青友夾澗松永劫不出門寂照涵虛空館娃宫一首相傳吳王故宫釋越來妖艷窮吳事俊逰笑談遺廟社繪罽及山丘鵷宿離宫瓦龍移别浦舟楯陳金制巧牀瑩玉光浮破雨驚楓落馳煙入虎流蓴羮摘千里荷蓋擁長洲緩緩花開陌彎彎月照州輕風香徑暖微步屧廊幽紅喜鱸堪切黃嗔蟹不收池痕測潮汐鄉思屬溫柔祗顧山銜日何知鉺帶鈎味於重處減心記捧時謀鯨鬛翻溟渤金星犯斗牛六千君子鋭二八國人憂泰伯三稱讓姑蘇一戰休共沉那有井獨墜苦無樓人去扁舟逺僧來野寺修宫烏今駭散臺鹿任鳴呦月為雕欄暗山含翠黛愁燭殘新别淚泉咽舊歌喉一代仇人事千年壯士羞東門抉眼在怒氣溢潮頭丙午寒食題淨土寺一首方見繁紅繡小園已隨流水渡前村人於醽醁真無分雨共鞦韆似有寃投老故應諸事懶問春能得幾分存不須便作匆匆散更把松梅子細論再題用前韻一首十年不到此祗園乂為岐郎暫出村犬認行蹤增踴躍燕增離恨苦埋寃鬢邉但覺新絲長璧上惟餘舊墨存但問桑麻添幾許世間萬事不須論洞庭題詠十一首太湖微生已覺漸休間老矣何心世路間盡把蟲魚束高閣且拏雙槳泛湖山林屋玉柱金庭鎖洞天更將琳館鎮山川碧簷委地剝風雨不賜錢來今幾年仙壇觀壇有朝真松羽蓋霓旌入絳霄偃松長向古壇朝我來欲討金丹訣試著枯槎上斗杓宿靈佑觀謝沈君并引聞林屋之勝久矣客姑蘇四十年欲至不可得紹熙辛亥歸自寶陀山始遂此志山在太湖中意其一島耳而岡重嶺復四野廣袤雞鳴犬吠中設井邑道宫佛剎鐘磬相和應接不暇莫知所適沈君伯仲一見傾蓋相導以往意色不倦乃得遍歷昔王逸少在越常欲一至閩嶺竟以事奪故前輩山水遊放之樂為人生難必之事自今而言不亦幸乎為賦二詩略紀所見以謝二君焉鳯翅出滄溟海船遇風順則正張二篷謂之鳯翅扁舟過洞庭銀河萬頃白螺髻兩山青凡隔幽虛洞神傳嶽瀆經不須尋上界只此是青冥水逺通天上山浮似海中四圍銀色界一簇畫屏風秋熟漁樵市雲連佛老宫我來迷所指多謝主人翁龜山釣魚臺鬼力人工劈石開水邉因作釣魚臺若為未有嚴光到留得絲綸待我來廣福上真宫水色碧蒼茫山勢青周遭壯哉杳渺峯據此第一高蕭梁古道場嵗月湮蓬蒿有來天師孫逺與朱葉曹十年悉力營萬瓦一手操連甍集紫煙開忩俯洪濤枸杞號千年夜鶴鳴九臯坐令會丹爐安此神火熬英英文章伯所至秃千毫何此老鍊師不著衮字褒謂范石湖於此獨無留題我泛重重湖歘得片片桃深窮草徑來敢憚足力勞其徒以為耻謂我不可逃試補華黍詩妄意續離騷橘圃外貌千層緑中心一暈紅封侯吾不願頗羡木奴豐又懷歸空有感包貢則無因跳入商山去添豫作五人水月院秦邸承遺恨滄浪足勝遊一篇水月記照徹五湖秋小湖寺去年禱雨旃檀林慈雲賜我三日霖今日包山小湖寺更得因緣禮大士小湖氣象似寶陀怪石列岸騰嵳峩近山一抹橫修蛾逺山點滴浮青螺四方上下皆滄波清秋一片銀為河風平如鏡著水磨有時粼粼緯碧羅傾覆變動一剎那蟄雷震起千蛟鼉吾聞天形象雞子大地為黃白為水太湖沉沉九地底小湖絶頂懸崖裏信哉山澤通一氣激而行之或可使湖山固是人所樂至人亦復酷愛此浮海而來開精藍蓮以草化紅臺三願分一枝入西土令我滅度生其間洞庭留别嶺松嵗古欲無根水石秋深未有痕無限好山將不去又依帆影過前林題瑞昌藍田寺覽秀軒一首無心軒冕難招我到眼雲山輒起豫不必憑欄更清賞此身原在此山居陪陳師登孺子亭一首獨善非忘世高風自有靈東湖山上色長為此人青上巳日雁汊阻風呈宋彥起一首往來定是一年一時節長逢三月三天氣未佳宜且住樹猶如此我何堪花飛與客渾無與酒好招人只自慙安得惠風和暢景與君方棹看淮南長風沙次宋丈韻一首已將身世等河沙又泛春江看浪花錦纜牙檣君送酒蓑衣蒻笠我浮家淹留日覺青春暮飄泊風兼細雨斜安得崑崙能探水試教來奏小琵琶投周益公三首余宰新昌日丞相周公東閣君綸為征官以名姓聞於公當是時公方柄用不欲往見其後南北道阻且長御李識荆此望絶矣慶元二年偶因督運道出廬陵公方釋位放意緑野而某吏役適相值豈天以此行從人欲耶奉投三首洛中九老後林下一人間蘚篆易鐘鼎泉聲先珮環禪從止水定詩挽正風還却為午橋惜惜無螺浦山二有錦雖當晝無心侈賜銘笻拖雲際緑箬戴雨中青國老甘鄉老台星復客星不須添入畫麟閣自圖形三公相昔宜避公間今可從分無先覩鳯情有後凋松一辦今拈出三熏敢不恭誰書御李事為我贊登龍瓜時有感一首籬邉方對菊花黃又報文移出草堂三宿敢云桑下戀四翁終願橘中藏泉縈去路常低咽酒向離亭不肯香聖代多才焉用我明年重上乞身章有感再作三首出去夢中事歸來酒後醒外貪垂老逸中樂放心寧花氣忩前入禽聲枕上聽自憐無此分明日又飄零二頓覺衰殘甚難勝委寄隆驚惶牛喘月悵望馬依風忍看丹爐壞終憐蕙帳空明年花慢發待我轉來紅三石壁連綿靜松風自在清只知有此樂不謂老於行室鵩從何入山猿纍爾驚回天誰有力祗願作淵明次陸務觀韻寄王景文一首時張丞相薨朔風搖楚水國步益艱辛往事忽成夢逺人何日臣凡今天下士皆屬座中人北望中原地縱橫淚灑巾訪晦翁不遇一首陳良千里赴周公正值啇山去一鴻腸斷膝行來處路舞雩空過一翻風題武夷沖佑觀一首九摺湍溪九摺山玉簮羅帶互回環若為脫得紅塵網來結踈茒一兩間都下病起呈王樞密一首不解雕蟲賦逐貧乂無饒舌論錢神遭逢此鬼今翻瘧零落吾生有限身舊學試溫渾易忘新書欲謹自難真時危壯士乃如此為報堂堂有位人龍塘晚遊一首五湖千里吞吳天館娃宫殿何悠然銀山鐵壘挽不動萬丈夕陽如血鮮野人固陋元不識光茫奪眼眼無力長安路逺人不來信道舉頭惟見日煌煌火德千載期赤帝之子張赤旗嵗寒水冷自可畏豈必夏盾同冬衰馮夷舞歸驚且悅幽壑沉沉忽金闕媚川謾道水含珠照氷詎誇虹貫月何處扁舟飛片帆中有西子輕紅衫想像玉顔人不逺杖頭星斗寒相參謝趙宰拜襄敏墓并留題二首并序惟先襄敏公受知烈聖神文之時學古入官獻太平詩制書名在第一裕陵伐叛受命西征闢國萬里全師獨克百年夢奠丘墓幽逺無有知者知縣趙公多識前言往行獨深知之奉詔出宰實部九原乃因勞農特枉三步盡尊賢之意存追古之心風示諸侯事關政教非特先烈感遇而已某不肖既獲躬執耒耜被撫田間又獲奉承薦酹感泣墓下敬賦二詩跪謝下執班春故事亦年年公獨推誠逺布宣麗日借黃催麥壠惠風吹緑散秧田衆魚入夢蓑衣下異雉飛馴桑蔭前好詠十竒歸樂府聖朝方採下民篇二河湟人去鎖春蕪三步遙勤一束芻盛事發揮千古烈英祠噓動百年枯故家不落今朝遇此段孤高近世無地下結成無限草待公肅甲破幽都讀浯溪碑一首浯溪之頌士大夫高之與風雅並行三百年矣參政王公之望始謂文簡詞費而紫薇舍人范公成大更疑其體與三頌戾論者譁然以余考之二公評文爾未正結之失也謹按春秋為尊者諱諱之為言忠於所事云爾魯娶同姓孔子諱之以明臣子之誼今靈武之事唐所宜隱也而動輒訕焉始兩京平册告宗廟稱嗣皇帝顔真卿曰上皇在蜀可乎其文放生池碑也中言問安侍膳不改家人之禮以愧肅宗結其同志者也相與大書特書亦異於夫子矣且天寶之亂明皇既棄厥位父老遮道請留太子幸人心未厭唐爾使二子而執史筆尤當婉而成章為尊者諱今乃出位倡言必曰至德改元不以正則有伯夷故事不食其粟可也委質為臣退而後言難以欺識者矣魯惡吳同姓唐嫌肅撫軍仲尼諱不語元結謗於文子固當承父臣其可訕君空令忠義士歎息異吾聞蘭亭一首并序晉寧逺將軍王公逸少始以咸康六年為江州刺史愛廬山紫霄峯居其下墨池在焉今歸宗寺是也永和六年徙為會稽內史盡十一年然則蘭亭之集蓋公在官之日也時晉政不綱春行秋令書曰天朗氣清得春秋之旨矣蕭統不悟不以入選坡公云拙於文而陋於識莫統若也其斯之謂與某家世九江視公為逺祖因過亭下尋訪遺迹莫知是否敬賦小詩以明公志金行中否野多遺越褉諸賢不受羈天朗氣清書上已春行秋令紀當時九原寂寞不可作一水縈回或在兹歸去廬山定相問為公關報紫霄知送沈侍郎二首獻納論思玉笋班間因忠讜忤龍顔一朝錦水連江水萬里河山與汴山道大可能忘濟世名高那得鎮投間天教一似蘇門下先到筠陽却詔還二重入修門已有期趣􅑽聊此著征衣帝思宣室名儒對人喜玄都舊客歸高節不難全晚嵗亨途未必盡危機願公且為蒼生起莫向苕溪戀翠微次韻范石湖北忩書懷一首驕陽重鬱結涼飈驚豁開排户始奔突轉隙少徘徊仄聞風伯言敬為邦君來邦君著之詩快吾心已灰獨念暑耘人斯時若為懷所願均此施醒然與之偕有水何心漿有甕何心醅莫吹天上雲要洗田中埃高枕謝北忩披襟笑登臺伏讀旨意大倍使吾容齋用太白韻贈報恩南老一首上人片雲孤賤子亦萍蹤南枝同社蓮千嵗後凋松今年九華山去年五老峯江南好風景但願長相從次韻酬李周翰一首大江固茫茫一葦即可越鄉來江與蘄孰使我輩隔溫溫李夫子粲粲謫仙格蕭然一竹關白眼謝俗客蚤充觀國賓百中應百發我玉堂自良彼怒輒反掇歸嘆儒冠誤盡把氣習撤收藏萬丈焰不受一夫決纍然駑馬中倍覺驥騏别嗟余偶傾蓋辱許共映雪快哉生平心清風濯炎熱今惟仄席秋正採鄉評月豈無識真人識君此竒節春雷震一聲指日看甲坼廬江道中二首處處雲山異時時氣象同官程嚴有限王事冗無窮晚色烘西日霜威釀北風人生真夢幻底用苦匆匆二老大添身倦飄零減性豪路塵知旱苦山瘦覺秋髙苦有持衡分慚無汗馬勞九原如可作公瑾笑吾曹題嚴陵釣臺一首并序題釣臺多矣大槩高之爾未有明其志者也光武既定天下深懲王氏之禍原於張禹孔光之流故昔之所謂坐論者一切吏之時或叱吒侯霸等俯首而已先生道高千古豈能堪此雖以禮聘不以禮答項枕卧語又從而蹸踐之使知已之不足驕士卒不可留古語云使騏驎可係而羈兮豈云異夫犬羊此則先生之志也其首陽之流乎為賦小詩以發千載一笑西都庸庸生禍胎東都切切繩公台平生故人苦畏辱坐定白雲那肯來沉幾深略滿帝腹且憩先生一雙足使知天上麒麟兒不似犬羊甘豢畜渭濱老叟不自持為人人以鷹名之豈識桐江一竿竹依舊秋風漁正肥古來賢者亦避世往往適逢天地閉得如建武亦不惡又值首陽難降志山木隂隂江面寒此天别在壺中寬幾曾流出桃花去寶氣自駭人間觀當時不願世知己稱到於今却如此塞馬得失天好還千駟齊侯不窮理禹穴一首并序昔鯀治水汨陳五行至禹反之天錫九疇得於龜負儒者紀述詳矣至遁甲開山圖乃謂宛委之神奏玉匱之書十二卷禹未及持其四入泉其四上天餘乃圖也用以治水已乃緘之洞穴而道家者流謂為靈保玉札符經就使有之按黃帝玄女兵法載黃帝有負圖之勝六甲隂陽之遁藏之會稽之山坎深千尺鎮以盤石又似非禹緘之抑禹之緘者又非此書耶緑緑煌煌錫禹疇厥初龜負即天休轉為玉札符經論果有藏書此穴不禹廟一首萬世衣裳脫介鱗一祠寧足報恩深長教天下江河順始慰胼胝手足心禹陵一首禹駕黃龍入九霄空山應有百神朝翠微不用熊羆守乞與遺民共採樵寄題識山堂一首山體如如即我身眼高才是箇中人錦囊忽上玉樓去誰復如公更識真題龍寺一首傍石尋幽徑窮源得梵城塔光侵地發龍氣逼山清是處堪吾老何年遂此生霜林知客意一夜戰秋聲出郊訪洗洞主一首抖擻塵埃暫出郊一藤先訪羽人巢風翻翠浪催禾穗秋放殷紅著樹梢萬里家山懷五老千年活計却三茅明朝便好乘風去不學浮屠更打包瀑布二首吟咏瀑水衆矣大抵比况爾未有得於所見鑿空下句為興詩者太白獨曰海風吹不斷江月照還空氣象雄傑古今絶唱而疑是銀河之句亦或比焉戲述二篇興比各一造物小兒不任事一天元氣從淋漓雲中雨降自應爾山上水行誰激之幽林洶洶虛籟作赫日粲粲寒光垂謫仙獨步得興體此外篇篇俱比詩二萬仭青空不可攀天將飛瀑挂其間一雙玉塔倚絶壁兩道白雲騰半山覆器以欹嗟魯廟設瓴而建笑秦關春風一卷出山去萬里青秋抱甕間曹娥廟一首英哉神女此江干德與餘姚舜一般碧草凄凄埋玉冷清風凛凛矗天寒求生古患為仁害誓死今知得所難我自徘徊不忍去非干潮小故盤桓題高逺亭一首小携樽酒作清逰行到方壺最上頭山在斷霞明處碧水從白鳥去邉流苦無妙句窺天巧賴有名亭慰客愁從此江南添勝景未應獨數庾公樓過東竹弔沈文伯一首苕霅雖幽事燕雲亦壯逰寧虞就日館不返渡淮舟死節千年在私家萬事休重來聯句地清淚接溪流次韻庸齋納涼一首招提竹鑰不曾關容我追涼突兀問石甃隂生寒水玉天燈爍散火雲山葛巾當晝何庸脫葵扇非秋却暫間所愧岑參聊爾耳強將詩與少陵班彭澤道中二首世路日益險道根終自深因勞踏石足倍起愛山心地冷雪常在嵗窮天更隂今宵投宿處知度幾層林二兹日定何日前山連後山吾曹凡事懶此去幾時還復辟尚英爽棄官真等間異時懷二子惆悵此山間溪山堂三首地勝年年别人間事事幽水流縈檻角山奮入簾鈎舊好空馳馬新盟但狎鷗故人皆得路何日共兹遊二出去真危道歸來適醉鄉田分禾穗合江落木隂涼璇極隨心濶銅壺入夢長一從輕卓魯方悟有羲黃三簷敝祛紅日忩虛挹白雲水痕一雨失花氣午風薰寂寂心無事紛紛耳不聞只須添道力底用戰魔軍尋真觀一首并序唐蔡真人乘鸞處蓋五老峯側九疊屏下也記云詠真洞天在龍潭底鸞升天上五峯青龍住山中九疊屏知有洞門藏水底倚闌吾欲跳清泠延真觀一首并引唐女道士李騰空葬科簡乘鸞處也騰空李林甫女故太白詩羡君相門女學道愛神仙偃月堂成竟斫棺延真人只葬衣冠浮雲眼見成雲騎不似抽身穩跨鸞挽張舍人安國四首天上張公子人間第一流浮雲狨覆座愕夢玉成樓草蔓湖隂宅松封壙口丘忠魂招不返欲問楚江頭二志氣周瑜俊謀謨賈誼佳早先天下士共服驥中驊瞬息桑田改傾摧嶽柱斜傷心大手筆零落紫薇花三忤世無如我知音獨有君時陪文字飲議列鸛鵝羣未脫雲間戍先修地下文天心終吝此不復更從軍四近別逾旬朔俄傳訃問來初疑餘子謗漸沸使人猜竟作青黃木終成怨怒雷數行衰淚盡吾意獨憐才池陽道中一首日月狂風裏悠悠小艇還繞身衣帶水堆眼劍鋩山嵗月吾生老煙塵客路艱一天霜氣重今夜碧蘆灣江上一首朔馬秋來健吳儂水底藏荻花江面冷草色岸頭荒揚子真天險淮南盡日忙邉隅今夜甲吾願莫飛霜泛舟一首霅川荷葉浦彭蠡石榴頭此地皆竒絶平生所爛遊從來貪水國老去只漁舟更有乘桴便何人從我浮雲居還值旱懷舊遊寄楊文仲二首憶扶湘竹杖共叩趙州關山好不容住水流今載還却從天上下似出鏡中間笑問楊夫子何時再得間二四野盡龜兆一天常火雲夜涼清似水晝旱氣如焚龍懶渾無用天高寂不聞我無田可慮只慮衆紛紛郊居即事一首涉世足悔吝杜門安退藏謗從間處省樂向靜中長薜荔日緣壁琅玕春透墻近來無事作渾以醉為鄉謝長安國相過一首元戎驅小隊來赴野人期山靜傳呼逺風輕遊賞宜飛羅穿杖履芳草煥旌旗好借絲綸手雕鐫一小詩宿淮南岸一首一昔淮南岸兩旬揚子江山川總極目天地偶為邦竟日師虞老何年敵自降心知除是月夜夜照篷忩贈尹氏子一首并引尹氏有俊子當代貴遊多贈以言勉勵期望必曰祿位南軒先生獨曰無以利欲誘之因贈小詩有兒聰慧了羣書底用金門與石渠幸甚先生矜小友一言端以正其初南至日呈詹司諫一首消息盈虛理甚明積隂盡處一陽生孤根莫厭風霜甚昨夜春雷坼甲聲入山遇雨宿開先寺二首擺落塵埃步入山與僧相對浹旬問鶴林却笑題詩客只得浮生半日間二雨漲泥痕卒未乾斷橋無䇿濟歸鞍山靈有意留儂住不作尋常俗駕看龜父國賔二周丈同遊谷簾三首偶然得意挹珍流二妙欣然共勝遊怪得坐間無俗語谷簾泉水建茶甌二萬斛跳珠撒一空水晶光透影􅌑瓏籃輿不是歸來早安得携瓶到此中三一飲清泠體便輕絶知真液是長生歸來世事都忘盡惟記白雲堆裏行寄鄭器先一首與子如兄弟為人痛疾仇暫時離别去且欲謗讒休敢忌秦方瘠深知越共舟少須三徑就他日再追逰冬日見桃一首梅意猶藏萼桃腮已放花地疑時候惡律恐統元差寒漲漁舟水春明道觀霞老來無賞玩癡坐惜年華遊洞霄宫一首洞天若限仙凡路九鎖山前不易尋尚有匡廬山下客玉皇恩詔與登臨鐡柱觀一首西晉旌陽令南昌鐡柱宫人間依道庇天上擢隂功江靜蠻夷漲爐存造化工我來如有遇舉袂欲凌風九日有感一首舉國無人分智囊滿川龍血戰玄黃百年馴致文明地一日盡為荆棘場關輔渴思王鎮惡蜀人猶喜杜黃裳小臣試草中興頌凖擬還京奉上皇和戴倅韻寄苖侯一首靈壁歸師憤已平黃河戍役又虛聲人言萬事總由命天設五材難去兵國有典型元老在地無形勢大江橫西風若得淮南信煩致空山慰客情八月遇西林一首似應沙鷺有前期􅋔點秋原景最宜落雨敗梧隨沆瀣牽風寒藻舞淪漪流旋碧玉渠初滿剝盡黃花稻已衰海裏是非休惱苦不如學取步兵癡蓬屋一首長簷千尺庇堂東踈漏從來盡是篷日影碎如秋葉下雨聲灑似夜舟中竹因蠧盡多垂地箬到枯時半掩空此處想非人所競衆雄應是不來攻詹林宗携文見過一首疇昔吾詹子文章已足稱近携新作至逺比舊來增迅灑行行雨清嚴字字氷桃花春浪近坐看九霄鵬佚老堂二首洛中九老後林下一人高此去自當佚向來誠獨勞東湖歸踐履南浦薦風騷尚念胸奴在家山未可褒二擺落鈞衡地追尋汗漫期馬間無用處鷗玩不驚時人朴山林古天全日月遲可無劉白伴時獻午橋詩早春示陳元逹一首北陸藏氷後東風入律和梅因三弄少麥賴六花多簮盍思喧馬燈逰羡閙蛾躬耕吾不倦其奈沒田何余門羅雀久矣今日池內有鷗戲為小題呈叔夏一首門冷人誰到機忘物自知舊來羅雀地今是狎鷗池身靜紅塵逺心間白日遲本來無事説拈出戲為詩宿五步港一首兩岸各風物四年三往還舟中五步港雲外九華山路逺虞衣闕囊空慮食艱大江吾隘爾天地一漁灣出豐城一首搖搖旌斾出洪都彌望田疇總廢墟羸馬不前身突兀耕夫相視笑軒渠倚松茅屋斜開户近水人家半賣魚蒲葉向冬猶未割臨風遙憶路溫舒宿祖印寺一首下馬杉松石徑幽暗泉一帶抱山流長廊隱隱丹青古香霧濛濛日夜浮缺月有情還委照羇人無語獨登樓急呼老瓦招歡伯為寫胸中萬斛愁投吏部汪尚書一首銓選仍多弊今年得偉人衣冠歸藻鑑草芥倚陽春冡宰天官貴山公啓事新請收才傑士預作鳯池賔逰三峽一首玉淵真水府三峽跨長虹萬斛鎔銀㵼千撾戰鼓雄倚天危石立透地密泉通四海思霖雨龍奚久在中訪子虛不遇一首曉入千山與萬山白雲深處欵幽關仙翁不許凡人識走出紅塵不肯還寄范石湖五首殊庭詔祿佚忠勤祕殿升班寵舊勳試向午橋諸第問有誰别墅得奎文二銀山鐡壘洞庭秋又見鴟夷一葉舟且是雲仍高一著祗將山水事清逰三湖山奔輳黛眉攢湖水晶瑩鏡面寒輔衮之絲元未盡西風吹上釣魚竿四近來能辟千年穀歸去非思一筯鱸聊示維摩隱几相要教獅子致文殊五彭澤歸來我自安壺中尤覺太虛寬世間萬事都忘盡只有公盟不敢寒遇流民有感一首行盡江南處處山無錢歸去買山間自憐不在施為地空對流民數汗顔過桃川萬夀宫二首人共桃花事一空兔葵無數舞春風傷心俯仰成今古知與劉郎事不同二甕子洞頭魂黯黯桃川山上目悽悽自憐終失邯鄲步不是重來舊路迷題惠山泉一首惠山泉似雪初消不數松江第四橋解挹清泠洗氛祲何時再有李文饒上巳日青龍道中一首身倦尋春事心懷結夏清猶臨曲水序莫續麗人行世態與吾異生涯何日成殷勤獨相送江上五湖平舍弟凂余為燈火計已而余出夜夢其以詩來感嘆賦一首吳頭望楚尾兩處各窮愁萬事吾皆失三冬汝自修人情千仭險春事九分休夢斷依然處天涯一釣舟金市大水一首日氣方穿户風潮忽及門郊原雨腳密忩牖浪花翻船係家家屋帆飛處處村江南一羇客微命託乾坤奔牛閘遇使者議和一首浩浩水千里層層限幾重誰為此過顙曲障爾朝宗浪散忽成雪潭昏那見龍浮山何足論聖德務含容題金山廟一首并序博陸侯驂乘宣帝背負芒刺李衛公行事宣宗亦曰近我者太尉耶每顧毛髮森豎俱不善終大抵人臣功高非身之福余來雲間疑博陸之祠在此問之邦人莫有知者三月二十一日夜半小船一潮抵廟下乃知錢氏忠懿王嘗夢侯曰我漢之霍某也王欲保此東南當為外護故廟以祠之夫侯之英靈能庇他人之國不能保其家豈用心廣大者寧身之不顧耶事業生扶漢英靈死庇吳明知蓋世烈亡速闔門誅日月夷黃道乾坤衍赤符空令百世下歎息用心無九日獨泛松江一首松江牢落一舟歸中有人驚嵗月違太一自期蓮葉是白衣何恨菊花非水收四面郊原濶霜入千山草木稀已分滄洲付吾道便應從此下漁磯九日陪金市諸友登高陽山二首窮途已負菊花期尚得諸公慰所思不道白衣持酒至共將烏帽入風吹紫萸秋淺浮觴少黃葉山高䇿杖遲却恨社中人闕一未將湯餅共追隨二讀書懷古恨難逢不謂斯時乃有公心自對談名利外士知尊價品題中一樽此地論文樂三徑何年結社同待得塵蹤去留決别將消息寄東風龍塘久别乘月再到奉呈同社一首在姑蘇龍塘疇昔擅雲煙破月重來倍爽然浮玉北堂三萬頃扁舟西子二千年青山識面爭迎棹白鷺知心不避船華髮翛翛更何往一茅終在此橋邉再用前韻一首已無功業上凌煙且泛扁舟逐計然自喜兹逰勝平日不知今夕是何年橫空蝃蝀聊欹枕滿袖嬋娟永共船同社賢豪多載酒坐添清興浩無邉姑蘇泛月一首夜來誰共泛靈槎飛上牽牛織女家但覺滿身天雨露絶無一點世塵沙秋將寒玉清風陳月借鎔銀潑浪花投曉歸來互相告等間休向俗人誇九月六日泛舟航村而舟人不審誤抵道場之麓越二日登焉因過何山漫賦一首千巖矗空濛一水還蔥蒨寺從馴虎立山作盤龍轉嗟豫千里來適此十年願初拏蓮葉舟誤逐桃花片重遺九節笻上盡百結線隂崖滴翠寒竹韻含風戰樹色爭煙霏泓甃靡旱熯載窺窣堵尖平視蒼狗變樓閣撑山光城郭瞰波面未覺髀肉酸先苦銀海眩晚尋一溪曲更得何山便平疇翠浪湧返照金色現回首笑月亭消息真已薦留别金市諸友一首扁舟昔東下徒步却西歸久客幸無恙諸公皆可依途窮須暫哭鳥倦不能飛他日相尋地江南一翠微都昌沿檄黟歙遇春一首忽忽年華換悠悠客路長春聲先水響山氣欲花香何輔公家事空隨吏役忙白雲知此意一片直都昌陪諸公登廣福觀下望彭蠡一首水繞一圍帶山橫八字眉壯哉極目地慰此憑欄時剡縣可乘興渼陂真好竒相逢休務日因得數言詩題落星寺一首島石是處有星辰曾霣無莊嚴成淨土怪誕出浮屠蜃氣樓穿海龍堆沙擁湖盡除金碧像吾欲舍吾徒傳舍中竹一首并序都昌傳舍之竹其始數枝而已護之三年遂滿一軒懼豫既去為人所伐作詩示代者後人蓋同年云浪蘂浮花不足看嵗寒獨與此君觀籜龍滿野今千變翔鳯何時下一餐日對吏文瀟灑在天生官地保全難明年我亦江湖去尚祝同年乞釣竿除夕有感一首不是功難立其如興自闌為貧沾寸祿漸喜得間官天下兵戈滿壺中日月寬殷勤除夜雪衰謝莫能歡秋日寄舍弟一首一從婚宦别家鄉又見西風雁作行卧念昔言乘欵段夢尋新句得池塘猿驚鶴怨草三尺楚尾吳頭天一方歸去兒童定相笑秋容已上鬢邉霜九日途中有感一首九日登高是故常只今何事負年芳紫萸欲佩憑誰繫黃菊無人只自香開拓愁邉須酒陳包羅風景入詩囊遙應親老持杯夜肴核橫陳畫燭光湖南道中三首失腳南來又兩年故山猿鶴祗凄然瀟湘不是無佳景終覺壺中别有天二已分餘生老一丘尚因微祿少遲留夢魂不待山資足先入江南問釣舟三萬壑千巖我一家别來空自鎖煙霞間雲不放行雲望故向東南角上遮登衡嶽三首陳雲戰雨沸中原五嶽之中四嶽昏節義衡山獨不辱萬年千載戴明恩二白衣蒼狗飛揚盡翠巘蒼崖杖履間獨到上封雷雨處退之元未識衡山三絶境當須著好詞衰懷已覺不勝竒煩君寄向仙家問怕有彌明更解詩題淡巖一首浯溪已借元碑顯愚谷還因桞序稱獨有淡巖人未識故煩山谷到零陵雪竇瀑布一首碧空無雨忽潺潺此水何人激在山塔現玉光依石側柱因氷凍瀝簷間長風浩蕩更相和元氣淋漓挽不還欲究本來源出處湘江誰借一枝斑試院二首老催人去樂滄浪十幅輕帆便可張尚有選材王事在夜深來此校文章二雨浸霜華冷作秋廣文官舍益窮愁夢魂却似知人意偏到廬山腳下州竹齋二首并引唐德明有竹軒訪余丐詩視其人有可壯者懼其移於貧也作二絶以堅之一圍寒緑鎖城闉中有茅簷更絶塵千户封侯千畝是可憐燕頷虎頭人二清隂翠色滿湘山月下風前極目間第一莫汚兒女淚失身嫌作杖頭斑見梅有感一首十月瀟湘盡放梅南枝仍避北枝開客愁無奈春消息腸斷江南驛使來次德和韻寄談李二丈二首心在淮山下身行湘水中喜拋餘子去恨不故人同舊隱勞征夢浮名任化工衡陽春漸暖終欲伴歸鴻二喜脫諸公忌愁違李與談離羣江以北弔影楚之南世故更千萬心胸只二三果能容我與終共結茒庵次韻葉教二首但有形如稿元無貨可珍四方長逆旅一念即明神漫仕緣將母非才敢教人無功叨廪祿祗覺蠧吾民二汨汨誠甘分空空敢自珍樂雖思泮水愚恐纍溪神怨謗從餘子稱揚獨故人功名非我事自是葛天民次韻來梓見贈一首無心穀璧陪蒲璧有分山光映水光子賤假令宜單父淵明終合在柴桑為氓且盡今生力責子寧須後代昌為問故人緣底事不來同醉酒醅香薦福寺一首并序乾道初余領畨易貢事實棘薦福寺以試堂下巖桂盛開為護持之人淳熙八年再至為賦一首十七年間一夢迷重來渾不辨東西院中誰識前時客莫莫堂前老木犀普陀山觀音巖祈雨一首南風不為雨躬即寶陀求地勢到此盡天河相接流鼇升千丈背蜃吐數層樓念彼觀音力楊枝灑有秋陳彌高惠詩次韻言謝一首南來日日訪人才始得清詩副所懷我計已成桴入海君行初似橘踰淮十年旅夢思乘興千里征塵忽及階見説又為勳業去獨能無意侣洪崖勸農題吉祥寺一首傍石尋幽徑窮源得梵城潮聲四面合山色一團清農合巡門勸僧煩倒屣迎明年吾更健來此伴中耕劉致政家東岡池蓮甚盛昔常飲焉賦此敘别二首一枝曾吸碧筒杯萬丈潮頭忽見催斜倚闌干獨惆悵明年應是不能來二世路東西自此分酒樽何日再論文虎蹲山下一回首望斷東岡是海雲浙江觀潮一首水向東南聚氣鍾子午間大洋一沸鼎衆溜各循環高岸忽為谷疾雷驚破山三年浮海客見此悟生還廣中南華寺一首一水透南粵高人憶老盧如何拈不起只為本來無匍匐三千里披攘五百徒都來些子事焉用爾區區廣中二首黑金不肯化青金奉命來催膽水淋山骨舊疑天鑿透溝流唯待雨來深丹無九轉如方士政有三官出上林却謝黃茅除白髮為酬平日做僧心二南來風土已安之事已當還敢故違銅柱略無功可録玉關空幸死前歸眼看餘劑憐猶在力憑征鞍覺漸微此去上還官印綬却來傳受祖師衣黃公灘一首贑名三百里中有大小黃公灘與萬安縣對無甚險惡坡公誤聽以為惶恐遂對喜歡慶元二年十一月十四夜余宿灘下夢人絳衣素冠辨論呶呶略記其旨似謂不願人畏余應之曰灘指石爾水何與焉其人有喜色意者黃公耶水泝安流舟不難人心自畏石頭頑黃公誤聽作惶恐玉局先生蓋謂灘廬山太平宫一首并序某生長此山中往來紫元景曜之下謂非逰客不當留題族子南震醮歸啓曰副宫老仙頗以為言惟歐陽公者逰嵩山見石上蘚書神清之洞而同來者不之見也公喜寄陸子履有醉翁今已作仙翁之句某非其人也敬賦短章折衷於真君云貝闕岧嶤不可攀遙分絳節下人間起元立道幾千嵗擇勝棲神第一山膏雨應時豐緑野真風與世養紅顔山前老叟非仙骨悵望丹崖蘚篆斑義豐集
